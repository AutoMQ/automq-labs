multitenancy_enabled: false

server:
  http_listen_port: 8080
  grpc_listen_port: 9095
  log_level: info
  grpc_server_max_concurrent_streams: 1000

common:
  storage:
    backend: s3
    s3:
      endpoint: minio:9000
      access_key_id: admin
      secret_access_key: password
      bucket_name: mimir-blocks
      insecure: true

memberlist:
  abort_if_cluster_join_fails: false
  compression_enabled: false
  join_members:
    - mimir-distributor
    - mimir-ingester-zone-a-0
    - mimir-ingester-zone-b-0
    - mimir-querier
    - mimir-query-frontend
    - mimir-query-scheduler
    - mimir-store-gateway
    - mimir-compactor

ingest_storage:
  enabled: true
  kafka:
    address: automq:9092
    topic: mimir-ingest
    auto_create_topic_enabled: true
    auto_create_topic_default_partitions: 1
    last_produced_offset_poll_interval: 500ms

distributor:
  remote_timeout: 5s
  ring:
    kvstore:
      store: memberlist

ingester:
  push_grpc_method_enabled: false
  track_ingester_owned_series: true
  ring:
    kvstore:
      store: memberlist
    replication_factor: 1
    zone_awareness_enabled: true
    heartbeat_period: 2s
    heartbeat_timeout: 10s
    num_tokens: 0
    min_ready_duration: 0s
    final_sleep: 0s
    unregister_on_shutdown: false
  partition_ring:
    kvstore:
      store: memberlist
    min_partition_owners_count: 1
    min_partition_owners_duration: 5s
    delete_inactive_partition_after: 2m

frontend_worker:
  scheduler_address: mimir-query-scheduler:9095

querier:
  query_store_after: 2h
  max_concurrent: 4

frontend:
  scheduler_address: mimir-query-scheduler:9095
  log_queries_longer_than: 5s
  max_body_size: 10485760

query_scheduler:
  max_outstanding_requests_per_tenant: 1000

store_gateway:
  sharding_ring:
    kvstore:
      store: memberlist
    replication_factor: 1

blocks_storage:
  storage_prefix: blocks
  tsdb:
    dir: /data/tsdb
    block_ranges_period:
      - 2m
    retention_period: 20m
    ship_interval: 30s
    head_compaction_interval: 30s
    flush_blocks_on_shutdown: true
  bucket_store:
    sync_dir: /data/tsdb-sync
    sync_interval: 15s

compactor:
  data_dir: /data/compactor
  compaction_interval: 2m
  cleanup_interval: 2m
  first_level_compaction_wait_period: 2m

limits:
  ingestion_rate: 100000
  ingestion_burst_size: 200000
  max_global_series_per_user: 0
  max_fetched_series_per_query: 0
  max_fetched_chunks_per_query: 0
  max_total_query_length: 24h
  native_histograms_ingestion_enabled: true
